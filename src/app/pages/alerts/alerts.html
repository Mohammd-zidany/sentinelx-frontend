<div class="space-y-6">

  <!-- عنوان الصفحة -->
  <div class="text-right">

    <h1 class="text-4xl font-bold text-white">
      التنبيهات الأمنية
    </h1>

    <p class="text-zinc-500 mt-2">
      تنبيهات التسلل والكشف الذكي في الوقت الحقيقي
    </p>

  </div>

  <!-- قائمة التنبيهات -->
  <div class="space-y-5">

    @for (alert of alerts; track alert.time) {

      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">

        <div class="flex items-center justify-between">

          <!-- مستوى الخطورة -->
          <div class="text-left">

            @if (alert.level === 'HIGH') {

              <div class="bg-red-500/20 text-red-400 px-4 py-2 rounded-xl font-bold">
                خطر عالي
              </div>

            }

            @if (alert.level === 'MEDIUM') {

              <div class="bg-orange-500/20 text-orange-400 px-4 py-2 rounded-xl font-bold">
                خطر متوسط
              </div>

            }

            @if (alert.level === 'LOW') {

              <div class="bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-xl font-bold">
                خطر منخفض
              </div>

            }

            <p class="text-zinc-500 text-sm mt-3">
              {{ alert.time }}
            </p>

          </div>

          <!-- معلومات التنبيه -->
          <div class="flex items-center gap-5 text-right">

            <div>

              <h2 class="text-2xl font-bold text-white">
                {{ alert.title }}
              </h2>

              <p class="text-zinc-500 mt-2">
                {{ alert.camera }}
              </p>

            </div>

            <div class="w-16 h-16 rounded-2xl bg-red-500/20 flex items-center justify-center text-3xl">
              🚨
            </div>

          </div>

        </div>

      </div>

    }

  </div>

</div>
